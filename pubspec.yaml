name: btaf_meet
description: A professional social networking and career platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  
  # Auth & Ads
  google_sign_in: ^6.2.1
  google_mobile_ads: ^5.1.0
  
  # State & Utilities
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  animate_do: ^3.3.4
  
  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
