# This file is used by Gradle to configure the build.
# For more details on how to configure your build, see
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# When set to true the Gradle daemon is used to run the build.
# The daemon is a long-lived process that helps avoid the overhead of JVM startup.
org.gradle.daemon=true

# When set to true Gradle will try to run tasks in parallel.
# This can significantly speed up builds on multi-core systems.
org.gradle.parallel=true

# When set to true Gradle will only configure projects that are needed by the requested tasks.
# This can speed up configuration time for large multi-project builds.
org.gradle.configureondemand=true

# Enable caching of task outputs between builds.
org.gradle.caching=true

# AndroidX is the successor to the Android Support Library.
android.useAndroidX=true
android.enableJetifier=true

# Kotlin code style
kotlin.code.style=official
